name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          # Install specific NDK version for Tauri v2 stability
          packages: 'ndk;26.1.10909125'

      - name: Build Frontend
        run: npm run build

      - name: Initialize Android project
        run: npx tauri android init --ci

      - name: Build APK
        run: npx tauri android build --debug --verbose
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          NDK_HOME: /usr/local/lib/android/sdk/ndk/26.1.10909125

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: src-tauri/gen/android/app/build/outputs/apk/debug/app-debug.apk
