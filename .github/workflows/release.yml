name: Create Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0.0

permissions:
  contents: write # Needed to create the release and upload assets

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Windows App
        run: npm run tauri build
      
      - name: Upload Windows Asset
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK
        run: sdkmanager "ndk;26.1.10909125"

      - name: Install dependencies
        run: npm install

      - name: Initialize Android project
        run: npx tauri android init --ci

      - name: Build APK (Optimized)
        run: npx tauri android build --debug --apk --verbose
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          NDK_HOME: /usr/local/lib/android/sdk/ndk/26.1.10909125

      - name: Upload Android Asset
        uses: actions/upload-artifact@v4
        with:
          name: android-binary
          path: src-tauri/gen/android/**/*.apk

  create-release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Display structure of downloaded files
        run: ls -R

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-binary/*.exe
            android-binary/**/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
